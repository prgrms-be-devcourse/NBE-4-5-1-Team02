spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:./db;MODE=MySQL;
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
      show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: debug
